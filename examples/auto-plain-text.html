<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="dark light">
    <title>Auto-download test (StreamSaver)</title>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/web-streams-polyfill@2.0.2/dist/ponyfill.min.js"></script>
    <script src="../StreamSaver.js"></script>
    <script>
      // Configure mitm path relative to this HTML page
      streamSaver.mitm = '../mitm.html'
    </script>

    <h1>Auto-download Test</h1>
    <p>This version auto-closes after writing all data - useful for E2E testing.</p>

    <p>Filename: <input type="text" id="$filename" value="test-file.txt"></p>
    <p>Size (MiB): <input type="number" id="$size" value="1" min="1" max="1000"></p>
    <p><button id="$start">Start Download</button></p>

    <p id="$status" style="color: gray;">Ready</p>

    <script>
      var Lorem = `Lorem ipsum dolor sit amet, consectetur adipiscing elit.
      Pellentesque gravida condimentum metus et porttitor. Curabitur
      pharetra vestibulum egestas. Pellentesque quis tortor id ligula
      cursus luctus ac at nisi. Mauris rutrum mattis vulputate. Donec
      tempor eget lectus eu rhoncus. Etiam et auctor est. Aenean sem augue,
      consectetur et ipsum fringilla, rhoncus tincidunt sem. Duis vel
      rutrum lectus, non dui. Duis non urna non dolor elementum
      commodo. Praesent commodo maximus lobortis. Curabitur fringilla
      tellus`.replace(/\s\s+/g, ' ')

      var encode = TextEncoder.prototype.encode.bind(new TextEncoder)
      let text = encode((Lorem + "\n\n").repeat(2*1024)) // 1 MiB chunk

      $start.onclick = async () => {
        const filename = $filename.value || 'test-file.zip'
        const sizeMiB = parseInt($size.value) || 1
        let remaining = sizeMiB

        $status.textContent = `Starting download: ${filename} (${sizeMiB} MiB)`
        $status.style.color = 'blue'

        const fileStream = streamSaver.createWriteStream(filename, {
          size: sizeMiB * 1024 * 1024
        })
        const writer = fileStream.getWriter()

        const pump = async () => {
          if (remaining-- > 0) {
            $status.textContent = `Writing... ${sizeMiB - remaining}/${sizeMiB} MiB`
            await writer.write(text)
            await pump()
          }
        }

        await pump()
        await writer.close()

        $status.textContent = `Done! File saved as: ${filename}`
        $status.style.color = 'green'
      }
    </script>
  </body>
</html>
